# AI Agent Sentry Configuration
# This file controls all system settings

system:
  name: "AI Agent Sentry"
  version: "1.0.0"
  debug: true

discovery:
  scan_network: true
  scan_headers: true
  scan_logs: true
  scan_apis: true
  network_scan_range:
    - "127.0.0.1/24"
    - "192.168.1.0/24"
  suspicious_keywords:
    - "api_key"
    - "token"
    - "secret"
    - "password"
    - "credentials"

monitoring:
  real_time: true
  alert_threshold: 10  # alerts per minute
  log_retention_days: 30

detection:
  ml_enabled: true
  anomaly_threshold: 0.15
  training_data_size: 100

response:
  auto_response: true
  actions:
    quarantine: true
    block_access: true
    revoke_permissions: true
    send_alert: true

alerts:
  slack_webhook: ""
  email: "admin@company.com"
  pagerduty_key: ""

security:
  encryption_enabled: true
  audit_logging: true