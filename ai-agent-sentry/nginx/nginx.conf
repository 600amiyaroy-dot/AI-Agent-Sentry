# ============================================
# NGINX LOAD BALANCER CONFIGURATION
# Enterprise AI Agent Sentry
# ============================================

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml;

    # ============================================
    # UPSTREAM SERVERS (Load Balancing)
    # ============================================
    upstream ai_sentry_backend {
        least_conn;  # Least connections algorithm
        
        # Add multiple app instances for scaling
        server app:8000 max_fails=3 fail_timeout=30s;
        # server app2:8000 max_fails=3 fail_timeout=30s;
        # server app3:8000 max_fails=3 fail_timeout=30s;
        
        keepalive 32;
    }

    # ============================================
    # MAIN SERVER
    # ============================================
    server {
        listen 80;
        server_name ai-sentry.local;

        # Health check endpoint
        location /health {
            proxy_pass http://ai_sentry_backend/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # API endpoints
        location /api/ {
            proxy_pass http://ai_sentry_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
        }

        # Web dashboard
        location / {
            proxy_pass http://ai_sentry_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files (cached)
        location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            proxy_pass http://ai_sentry_backend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ============================================
    # HTTPS SERVER (Optional)
    # ============================================
    # server {
    #     listen 443 ssl http2;
    #     server_name ai-sentry.local;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     
    #     # Same proxy settings as above
    # }
}