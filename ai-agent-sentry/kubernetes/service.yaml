# ============================================
# KUBERNETES SERVICE
# ============================================

apiVersion: v1
kind: Service
metadata:
  name: ai-agent-sentry-service
  namespace: security
  labels:
    app: ai-agent-sentry
spec:
  selector:
    app: ai-agent-sentry
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
# ============================================
# LOAD BALANCER SERVICE (External)
# ============================================

apiVersion: v1
kind: Service
metadata:
  name: ai-agent-sentry-lb
  namespace: security
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  selector:
    app: ai-agent-sentry
  ports:
  - name: http
    port: 80
    targetPort: 8000
  - name: https
    port: 443
    targetPort: 8000
  type: LoadBalancer